<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1e12">
<link rel="manifest" href="manifest.json">
<title>Relatórios 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* mobile-first: coluna por padrão */
body {
  min-height: 100vh;
  background: #0b1e12;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 32px;
  padding: 20px;
}

a {
  display: block;
  border-radius: 24px;
  overflow: hidden;
  flex-shrink: 0;
  transition: transform .22s cubic-bezier(.34,1.4,.64,1), box-shadow .22s ease;
}

a:hover {
  transform: scale(1.04);
  box-shadow: 0 28px 64px rgba(0,0,0,.6);
}

img {
  width: 82vw;
  height: 82vw;
  max-width: 340px;
  max-height: 340px;
  object-fit: contain;
  display: block;
}

/* desktop: lado a lado */
@media (min-width: 900px) {
  body { flex-direction: row; gap: 60px; padding: 24px; }
  img { width: 320px; height: 320px; max-width: none; max-height: none; }
  a:hover { transform: translateY(-8px) scale(1.05); }
}
</style>
</head>
<body>

<a href="casavequia.html">
  <img src="botãocasavequia.png" alt="Pe. Carlos Casavequia">
</a>

<a class="h2" href="herminio.html">
  <img src="botãoherminio.png" alt="Raimundo Hermínio de Melo">
</a>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
}
</script>
</body>
</html>
